name: 00981A 持股變動監控

on:
  schedule:
    # 每天台灣時間 19:30 執行 (UTC 11:30)
    - cron: '30 11 * * *'
  workflow_dispatch:      # 讓你可以點擊按鈕手動測試

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出倉庫
        uses: actions/checkout@v3

      - name: 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: pip install requests pandas lxml beautifulsoup4

      - name: 執行比對腳本
        run: python scraper.py

      - name: 將更新提交回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add holdings.json
          git commit -m "自動更新持股: $(date +'%Y-%m-%d')" || exit 0
          git push
